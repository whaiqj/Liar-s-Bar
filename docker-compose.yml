name: liarsbar

services:
  # MySQL Database
  mysql:
    image: mysql:8.0
    container_name: liarsbar-mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root123
      MYSQL_DATABASE: liars_bar
      MYSQL_USER: liarsbar
      MYSQL_PASSWORD: liarsbar123
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - liarsbar
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-proot123"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis Cache
  redis:
    image: redis:7-alpine
    container_name: liarsbar-redis
    restart: always
    ports:
      - "6379:6379"
    networks:
      - liarsbar
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  # Go Backend
  backend:
    build:
      context: ./backend
      dockerfile: ../deploy/Dockerfile.backend
    container_name: liarsbar-backend
    restart: always
    ports:
      - "8082:8080"
    environment:
      SERVER_PORT: "8080"
      DB_HOST: mysql
      DB_PORT: "3306"
      DB_USER: liarsbar
      DB_PASSWORD: liarsbar123
      DB_NAME: liars_bar
      REDIS_ADDR: redis:6379
      REDIS_PASSWORD: ""
      JWT_SECRET: liars-bar-secret-key-2024
      AI_SERVICE_URL: http://ai-service:8000
      AI_ENABLED: "true"
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
      ai-service:
        condition: service_started
    networks:
      - liarsbar

  # AI Service
  ai-service:
    build:
      context: ./ai-service
      dockerfile: ../deploy/Dockerfile.ai
    container_name: liarsbar-ai
    restart: always
    ports:
      - "8000:8000"
    environment:
      AI_PORT: "8000"
    networks:
      - liarsbar

  # Vue Frontend
  frontend:
    build:
      context: ./frontend
      dockerfile: ../deploy/Dockerfile.frontend
    container_name: liarsbar-frontend
    restart: always
    ports:
      - "3000:3000"
    networks:
      - liarsbar

  # Nginx Reverse Proxy
  nginx:
    image: nginx:alpine
    container_name: liarsbar-nginx
    restart: always
    ports:
      - "8081:80"
    volumes:
      - ./deploy/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - backend
      - frontend
    networks:
      - liarsbar

networks:
  liarsbar:
    driver: bridge

volumes:
  mysql_data:
